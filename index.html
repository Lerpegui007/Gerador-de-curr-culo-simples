<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f0f2f5;
            display:flex;
            justify-content:center;
            padding:40px 20px;
        }
        
        .container{
            width:100%;
            max-width:800px;
        }
        
        h2{
            text-align:center;
            color:#1f3c88;
            margin-bottom:30px;
        }
        
        form{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }
        
        label{
            display:block;
            margin-bottom:6px;
            margin-top:15px;
            font-weight:bold;
            color:#333;
        }
        
        input,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }
        
        input:focus,
        textarea:focus{
            outline:none;
            border-color:#1f3c88;
        }
        
        textarea{
            resize:vertical;
            min-height:100px;
        }
        
        button{
            width:100%;
            margin-top:25px;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#1f3c88;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }
        
        button:hover{
            background:#162c66;
        }
        </style>
        
</head>
<body>
    <h2>Formulario Curriculo</h2>
    <form id="formularioCurriculo">
        <label for="Nome">Nome:</label>
        <input type="text"id="Nome" name="nome" placeholder="Digite o seu nome" required>
        
        <label for="Idade">Idade:</label>
        <input type="text" id="Idade" name="idade" placeholder="Digite sua idade" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required>

        <label for="Telefone">Telefone:</label>
        <input type="text" id="Telefone" name="telefone" placeholder="Digite seu telefone" required>

        <label for="Cidade">Cidade:</label>
        <input type="text" id="Cidade" name="cidade" placeholder="Digite o nome da cidada em que você mora">

        <label for="Endereco">Endereço (opicional):</label>
        <input type="text" id="Endereco" name="endereco" placeholder="Digite o seu endereço">

        <label for="perfil">Perfil Profissional:</label>
        <textarea id="perfil" name="perfil profissional"></textarea>

        <label for="habilidades">Habilidades:</label>
        <textarea id="habilidades" name="habilidades"></textarea>

        <label for="formacao">Formação:</label>
        <textarea id="formacao" name="formacao"></textarea>

        <label for="experiencia">Experiência Profissional:</label>
        <textarea id="experiencia" name="experiencia profissional"></textarea>

        <button type="submit">Enviar</button>
</form>
<script src="gerenciamento.js"></script>
</body>
</html>
