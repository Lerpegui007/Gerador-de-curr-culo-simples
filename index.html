<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #1e2124;
            display: flex;
            align-items: flex-start;
            gap: 40px;
            padding: 40px;
        }

        .container {
            width: 420px;
        }

        h2 {
            color: #1f3c88;
            margin-bottom: 25px;
            text-align: center;
        }

        form {
            background: rgb(50, 46, 46);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .2);
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
            color: #c3c3c3;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #1f3c88;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .templates {
            margin-top: 25px;
        }

        .templates label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            cursor: pointer;
        }

        .templates input {
            width: auto;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #1f3c88;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #162c66;
        }

        #preview {
            flex: 1;
            min-height: 800px;
            background: #2b2b2b;
            border-radius: 12px;
            padding: 20px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #preview p {
            color: #aaa;
            font-size: 18px;
        }

        iframe#preview {
    width: 100%;
    height: 1100px;
    border: none;
    border-radius: 12px;
        }
        
        @media (max-width: 900px) {

    body {
        flex-direction: column;
        align-items: center;
        padding: 20px;
        gap: 20px;
    }

    .container {
        width: 100%;
        max-width: 600px;
    }

    #preview {
        width: 100%;
        min-height: 600px;
    }

    #preview iframe {
        width: 100%;
        height: 850px;
    }

        
    </style>

</head>

<body>

    <div class="container">

        <h2>Formulário do Currículo</h2>

        <form id="formularioCurriculo">

            <label for="Nome">Nome:</label>
            <input type="text" id="Nome" name="nome" placeholder="Digite seu nome" required>

            <label for="Idade">Idade:</label>
            <input type="text" id="Idade" name="idade" placeholder="Digite sua idade" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

            <label for="Telefone">Telefone:</label>
            <input type="text" id="Telefone" name="telefone" placeholder="Digite seu telefone" required>

            <label for="Cidade">Cidade:</label>
            <input type="text" id="Cidade" name="cidade" placeholder="Digite sua cidade">

            <label for="Endereco">Endereço (opcional):</label>
            <input type="text" id="Endereco" name="endereco" placeholder="Digite seu endereço">

            <label for="perfil">Perfil Profissional:</label>
            <textarea id="perfil" name="perfil_profissional"></textarea>

            <label for="habilidades">Habilidades:</label>
            <textarea id="habilidades" name="habilidades"></textarea>

            <label for="formacao">Formação Acadêmica:</label>
            <textarea id="formacao" name="formacao"></textarea>

            <label for="experiencia">Experiência Profissional:</label>
            <textarea id="experiencia" name="experiencia_profissional"></textarea>
            
            <div class="templates">

                <h2>Escolha um Template</h2>

                <label>
                    <input type="radio" name="template" value="simples" checked>
                    Template Simples
                </label>

                <label>
                    <input type="radio" name="template" value="moderno">
                    Template Moderno
                </label>

                <label>
                    <input type="radio" name="template" value="executivo">
                    Template Executivo
                </label>

            </div>

            <button type="submit">Gerar Currículo</button>

        </form>

    </div>

  <iframe id="preview" width="850" height="1100"></iframe>

    <script src="templates.js"></script>
    <script src="gerenciamento.js"></script>

</body>

</html>
