<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Curriculo</title>

    <style>
        /* Configuração da página A4 */
        @page {
            size: A4;
            margin: 2cm;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 30px;
            color: #333;
        }

        .curriculo {
            max-width: 850px;
            margin: auto;
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1,
        .curriculo h1 {
            margin: 0;
            color: #1f3c88;
            font-size: 38px;
            text-align: center;
        }

        .contato {
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .contato p {
            margin: 5px 0;
            color: #555;
        }

        section {
            margin-top: 30px;
        }

        h2 {
            color: #1f3c88;
            border-bottom: 3px solid #1f3c88;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        p {
            line-height: 1.7;
            text-align: justify;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 8px;
            line-height: 1.5;
        }

        strong {
            color: #1f3c88;
        }

        /* Ajustes para impressão/PDF */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }

            .curriculo {
                max-width: 100%;
                width: 100%;
                margin: 0;
                padding: 0;
                box-shadow: none;
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

    <div class="curriculo">

        <h1 id="nome_salvo"></h1>

        <div class="contato">
            
            <p><strong>idade:</strong> <span id="idade_salvo"></span></p>

            <p><strong>Email:</strong> <span id="email_salvo"></span></p>

            <p><strong>Telefone:</strong> <span id="telefone_salvo"></span></p>

            <p><strong>Cidade:</strong> <span id="cidade_salvo"></span></p>

            <p id="linha_endereco"><strong>Endereço:</strong> <span id="endereco_salvo"></span></p>

        <h2>Perfil Profissional</h2>

        <p id="perfil_salvo"></p>

        <h2>Formação Acadêmica</h2>

        <p id="formacao_salvo"></p>

        <h2>Habilidades</h2>

        <p id="habilidades_salvo"></p>

        <h2>Experiência Profissional</h2>

        <p id="experiencia_salvo"></p>

    </div>

<script src="curriculo.js"></script>

</body>

</html>
